<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<canvas id="grid"></canvas>
<canvas id="particles"></canvas>

<div class="login-container">

<div class="login-card">

<h2>Create Account</h2>

<form method="POST">

<input class="login-input" type="text" name="username" placeholder="Username" required>

<input class="login-input" type="email" name="email" placeholder="Email" required>

<input class="login-input" type="password" name="password" placeholder="Password" required>

<button class="login-btn">Register</button>

</form>

<br>

<a href="/login">Back to login</a>

</div>

</div>

<script src="{{ url_for('static', filename='animations/grid.js') }}"></script>
<script src="{{ url_for('static', filename='animations/particles.js') }}"></script>

</body>

</html>
